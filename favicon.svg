<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#2E5D4B"/>
  <!-- Head -->
  <circle cx="16" cy="7" r="2.5" fill="#F5F0E8"/>
  <!-- Body -->
  <line x1="16" y1="9.5" x2="16" y2="18" stroke="#F5F0E8" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Left arm (raised up) -->
  <line x1="16" y1="12" x2="10" y2="8" stroke="#F5F0E8" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Right arm (extended down-right) -->
  <line x1="16" y1="12" x2="22" y2="15" stroke="#F5F0E8" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Left leg (extended out) -->
  <line x1="16" y1="18" x2="10" y2="25" stroke="#F5F0E8" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Right leg (raised, dancing pose) -->
  <line x1="16" y1="18" x2="22" y2="22" stroke="#F5F0E8" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Gold accent dot -->
  <circle cx="10" cy="8" r="1.2" fill="#B8963E"/>
</svg>
